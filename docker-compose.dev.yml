# Desarrollo local con hot reload (Next.js `next dev`).
# No modifica ni reemplaza docker-compose.yml de producción / Traefik.
#
# Uso:
#   docker compose -f docker-compose.dev.yml up --build
#
# Sitio: http://localhost:3000
#
# Si cambiás dependencias en package.json: docker compose -f docker-compose.dev.yml down -v
# y volvé a levantar (recrea el volumen de node_modules).
#
# Alternativa sin Docker: npm install && npm run dev

services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: paneles-mgi-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_next:/app/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Paneles MGI}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
      CONTACT_BCC_EMAIL: ${CONTACT_BCC_EMAIL}

volumes:
  dev_node_modules:
  dev_next:

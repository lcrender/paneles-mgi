version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paneles-mgi-web
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0

      # Agregar variables de entorno adicionales aquí si las necesitas
      # - NEXT_PUBLIC_API_URL=https://api.example.com
      # - DATABASE_URL=postgresql://...
    networks:
      - root_default
    labels:
      # Habilitar Traefik
      - "traefik.enable=true"
      
      # Router principal (HTTPS)
      - "traefik.http.routers.paneles-mgi.rule=Host(`<DOMINIO_A_DEFINIR>`)"
      - "traefik.http.routers.paneles-mgi.entrypoints=websecure"
      - "traefik.http.routers.paneles-mgi.tls=true"
      - "traefik.http.routers.paneles-mgi.tls.certresolver=letsencrypt"
      
      # Servicio
      - "traefik.http.services.paneles-mgi.loadbalancer.server.port=3000"
      
      # Middleware (opcional - para redirección HTTP a HTTPS)
      # Descomenta si quieres forzar HTTPS
      # - "traefik.http.middlewares.paneles-mgi-redirect.redirectscheme.scheme=https"
      # - "traefik.http.middlewares.paneles-mgi-redirect.redirectscheme.permanent=true"
      # - "traefik.http.routers.paneles-mgi-http.rule=Host(`<DOMINIO_A_DEFINIR>`)"
      # - "traefik.http.routers.paneles-mgi-http.entrypoints=web"
      # - "traefik.http.routers.paneles-mgi-http.middlewares=paneles-mgi-redirect"

networks:
  root_default:
    external: true


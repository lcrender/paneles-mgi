# Producción detrás de Traefik: la red root_default debe existir (la crea el stack de Traefik).
# En local sin esa red: docker network create root_default
#   o usá: docker compose -f docker-compose.local.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paneles-mgi-web
    restart: always

    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Paneles MGI}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
      CONTACT_BCC_EMAIL: ${CONTACT_BCC_EMAIL}

    networks:
      - root_default

    labels:
    - "traefik.enable=true"
    - "traefik.docker.network=root_default"

    # HTTPS router canónico (solo dominio sin www)
    - "traefik.http.routers.paneles-mgi.rule=Host(`mgipaneles.com.ar`)"
    - "traefik.http.routers.paneles-mgi.entrypoints=websecure"
    - "traefik.http.routers.paneles-mgi.tls=true"

    # service
    - "traefik.http.services.paneles-mgi.loadbalancer.server.port=3000"

    # HTTP apex -> HTTPS apex
    - "traefik.http.routers.paneles-mgi-http.rule=Host(`mgipaneles.com.ar`)"
    - "traefik.http.routers.paneles-mgi-http.entrypoints=web"
    - "traefik.http.routers.paneles-mgi-http.middlewares=paneles-mgi-redirect"

    - "traefik.http.middlewares.paneles-mgi-redirect.redirectscheme.scheme=https"
    - "traefik.http.middlewares.paneles-mgi-redirect.redirectscheme.permanent=true"

    # www (http y https) -> canónico https://mgipaneles.com.ar
    - "traefik.http.routers.paneles-mgi-www-http.rule=Host(`www.mgipaneles.com.ar`)"
    - "traefik.http.routers.paneles-mgi-www-http.entrypoints=web"
    - "traefik.http.routers.paneles-mgi-www-http.middlewares=paneles-mgi-www-redirect"

    - "traefik.http.routers.paneles-mgi-www-https.rule=Host(`www.mgipaneles.com.ar`)"
    - "traefik.http.routers.paneles-mgi-www-https.entrypoints=websecure"
    - "traefik.http.routers.paneles-mgi-www-https.tls=true"
    - "traefik.http.routers.paneles-mgi-www-https.middlewares=paneles-mgi-www-redirect"

    - "traefik.http.middlewares.paneles-mgi-www-redirect.redirectregex.regex=^https?://www\\.mgipaneles\\.com\\.ar/(.*)"
    - "traefik.http.middlewares.paneles-mgi-www-redirect.redirectregex.replacement=https://mgipaneles.com.ar/$$1"
    - "traefik.http.middlewares.paneles-mgi-www-redirect.redirectregex.permanent=true"

networks:
  root_default:
    external: true # debe existir en el host (p. ej. creada por Traefik)
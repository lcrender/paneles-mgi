version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paneles-mgi-web
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0

    networks:
      - root_default

    labels:
      - "traefik.enable=true"

      # Router HTTPS (principal)
      - "traefik.http.routers.paneles-mgi.rule=Host(`mgipaneles.com.ar`,`www.mgipaneles.com.ar`)"
      - "traefik.http.routers.paneles-mgi.entrypoints=websecure"
      - "traefik.http.routers.paneles-mgi.tls=true"
      - "traefik.http.routers.paneles-mgi.tls.certresolver=letsencrypt"

      # Servicio (puerto del contenedor Next.js)
      - "traefik.http.services.paneles-mgi.loadbalancer.server.port=3000"

      # Router HTTP (redirige a HTTPS)
      - "traefik.http.routers.paneles-mgi-http.rule=Host(`mgipaneles.com.ar`,`www.mgipaneles.com.ar`)"
      - "traefik.http.routers.paneles-mgi-http.entrypoints=web"
      - "traefik.http.routers.paneles-mgi-http.middlewares=paneles-mgi-redirect"

      # Middleware redirección HTTPS
      - "traefik.http.middlewares.paneles-mgi-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.paneles-mgi-redirect.redirectscheme.permanent=true"

networks:
  root_default:
    external: true